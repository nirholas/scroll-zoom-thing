site_name: PAI Documentation
site_description: Private AI on a bootable USB drive — Debian + Sway + Ollama.
site_url: https://docs.pai.direct
repo_url: https://github.com/nirholas/scroll-zoom-thing
repo_name: nirholas/scroll-zoom-thing
edit_uri: edit/main/src/

docs_dir: src
site_dir: _site

theme:
  name: material
  custom_dir: overrides
  language: en
  logo: assets/pai-logo-white.png
  palette:
    - scheme: slate
      primary: custom
      accent: custom
  font:
    text: Inter
    code: JetBrains Mono
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.top
    - navigation.instant
    - navigation.tracking
    - search.suggest
    - search.highlight
    - content.code.copy
    - content.action.edit
    - toc.follow

extra_css:
  - assets/pai-theme.css
  - assets/stylesheets/home.css

markdown_extensions:
  - admonition
  - attr_list
  - def_list
  - footnotes
  - md_in_html
  - tables
  - toc:
      permalink: true
  - pymdownx.details
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.tasklist:
      custom_checkbox: true

extra:
  social:
    - icon: fontawesome/brands/x-twitter
      link: https://x.com/nichxbt
      name: nichxbt on X
    - icon: fontawesome/brands/github
      link: https://github.com/nirholas
      name: nirholas on GitHub

plugins:
  - search

