# AGENT: site_name — browser tab title and site header (e.g. "Acme Documentation")
site_name: scroll-zoom-thing
# AGENT: site_description — meta description and OG tag (one sentence)
site_description: A pure-CSS 3D parallax MkDocs Material template — no JavaScript, four AVIF layers, one perspective container.
# AGENT: site_url — production URL; canonical URL and sitemap base
site_url: https://scroll-zoom-thing.pages.dev
# AGENT: repo_url — "View on GitHub" link target
repo_url: https://github.com/nirholas/scroll-zoom-thing
# AGENT: repo_name — repo label shown in the header
repo_name: nirholas/scroll-zoom-thing
# AGENT: edit_uri — base path for "Edit this page" links; remove if you don't want them
edit_uri: edit/main/src/

docs_dir: src
site_dir: _site

theme:
  name: material
  custom_dir: overrides
  language: en
  # AGENT: logo — relative to docs_dir (src/)
  logo: images/3d.svg
  palette:
    - scheme: slate
      primary: custom
      accent: custom
  font:
    text: Inter
    code: JetBrains Mono
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.top
    - navigation.instant
    - navigation.tracking
    - search.suggest
    - search.highlight
    - content.code.copy
    - content.action.edit
    - toc.follow

extra_css:
  - assets/pai-theme.css
  - assets/stylesheets/home.css

markdown_extensions:
  - admonition
  - attr_list
  - def_list
  - footnotes
  - md_in_html
  - tables
  - toc:
      permalink: true
  - pymdownx.details
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.tasklist:
      custom_checkbox: true

extra:
  social:
    - icon: fontawesome/brands/x-twitter
      link: https://x.com/nichxbt
      name: nichxbt on X
    - icon: fontawesome/brands/github
      link: https://github.com/nirholas
      name: nirholas on GitHub

plugins:
  - search

nav:
  - Home: index.md
  - Overview:
      - Overview: overview/index.md
      - How it works: overview/how-it-works.md
  - Getting started:
      - Getting started: getting-started/index.md
      - Quickstart: getting-started/quickstart.md
      - Use as template: getting-started/use-as-template.md
      - Local development: getting-started/local-development.md
  - Guides:
      - Guides: guides/index.md
      - Your own layers: guides/your-own-layers.md
      - Hero copy: guides/hero-copy.md
      - Theme: guides/theme.md
      - Pages and nav: guides/pages-and-nav.md
  - AI:
      - AI: ai/index.md
      - Image generation: ai/image-generation.md
      - Agents: ai/agents.md
  - Apps:
      - Apps: apps/index.md
      - Product docs: apps/product-docs.md
      - Personal sites: apps/personal-sites.md
      - Conferences: apps/conferences.md
  - Advanced:
      - Advanced: advanced/index.md
      - CSS techniques: advanced/css-techniques.md
      - MkDocs skills: advanced/mkdocs-skills.md
      - Performance: advanced/performance.md
      - Video layers: advanced/video-layers.md
  - Privacy:
      - Privacy: privacy/index.md
      - Analytics: privacy/analytics.md
      - Accessibility: privacy/accessibility.md
  - Examples:
      - Examples: examples/index.md
      - docs.pai.direct: examples/docs-pai-direct.md
  - Development:
      - Development: development/index.md
      - Contributing: development/contributing.md
      - Local setup: development/local-setup.md
  - Deploy:
      - Deploy: deploy/index.md
      - Vercel: deploy/vercel.md
      - Cloudflare Pages: deploy/cloudflare.md
      - GitHub Pages: deploy/github-pages.md
      - Netlify: deploy/netlify.md
      - Railway: deploy/railway.md
  - Reference:
      - Reference: reference/index.md
      - CSS variables: reference/css-variables.md
      - File structure: reference/file-structure.md
      - Glossary: reference/glossary.md
      - FAQ: reference/faq.md
  - About:
      - About: about/index.md
